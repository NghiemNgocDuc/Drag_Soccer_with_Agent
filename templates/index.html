<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent Soccer</title>
<style>
:root{
  --glass-bg:rgba(255,255,255,.62);
  --glass-border:rgba(180,205,255,.5);
  --glass-shadow:0 8px 32px rgba(80,120,200,.10),inset 0 1px 0 rgba(255,255,255,.95);
  --blur:18px;
  --accent-a:#3b82f6;
  --accent-b:#ef4444;
  --text:#1e2d4f;
  --muted:#6b7fa3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:linear-gradient(145deg,#e0eaff 0%,#ede9fe 45%,#d1fae5 100%);
  font-family:'Inter',system-ui,sans-serif;
  color:var(--text);
}
.glass{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
  backdrop-filter:blur(var(--blur));
  -webkit-backdrop-filter:blur(var(--blur));
  border-radius:18px;
}
nav{
  display:flex;align-items:center;gap:12px;padding:10px 24px;
  background:rgba(255,255,255,.78);
  border-bottom:1px solid rgba(180,205,255,.4);
  position:sticky;top:0;z-index:100;
}
.nav-brand{font-weight:700;font-size:1rem;color:var(--text)}
.nav-links{display:flex;gap:4px;margin-left:auto}
.nav-link{
  padding:6px 14px;border-radius:8px;font-size:.82rem;font-weight:500;
  color:var(--muted);text-decoration:none;transition:all .15s;
}
.nav-link:hover,.nav-link.active{background:rgba(59,130,246,.1);color:var(--accent-a)}
.nav-user{font-size:.82rem;color:var(--muted);padding:6px 0 6px 12px;border-left:1px solid rgba(180,205,255,.4)}
main{max-width:1200px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:16px}

/* Score HUD */
.hud{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
}
.team{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:110px}
.team-name{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.team-score{font-size:2.4rem;font-weight:800;line-height:1}
.team-a .team-score{color:var(--accent-a)}
.team-b .team-score{color:var(--accent-b)}
.hud-mid{display:flex;flex-direction:column;align-items:center;gap:6px}
.kick-counter{font-size:1.6rem;color:#000;font-weight:700;line-height:1}
.turn-badge{
  padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:600;
}
.turn-badge.turn-a{background:rgba(59,130,246,.15);color:var(--accent-a)}
.turn-badge.turn-b{background:rgba(239,68,68,.15);color:var(--accent-b)}
.winner-banner{
  display:none;padding:8px 20px;border-radius:12px;font-size:.9rem;font-weight:700;
  background:rgba(16,185,129,.15);color:#059669;text-align:center;
}

/* Canvas */
.canvas-wrap{
  border-radius:20px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  position:relative;cursor:default;
  border:1px solid rgba(255,255,255,.1);
}
#game-canvas{display:block;width:100%;touch-action:none}
.canvas-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:600;color:var(--text);
}
.canvas-overlay.visible{display:flex}
.spinner{
  width:32px;height:32px;border:3px solid rgba(59,130,246,.2);
  border-top-color:var(--accent-a);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.fs-btn{
  position:absolute;bottom:8px;left:8px;z-index:10;
  width:32px;height:32px;border-radius:8px;border:none;
  background:rgba(255,255,255,.2);color:#fff;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;line-height:1;
}
.fs-btn:hover{background:rgba(255,255,255,.4)}
.sound-btn{
  position:absolute;top:8px;right:8px;z-index:10;
  width:32px;height:32px;border-radius:8px;border:none;
  background:rgba(255,255,255,.2);color:#fff;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s;line-height:1;
}
.sound-btn:hover{background:rgba(255,255,255,.4)}
#fs-wrap:fullscreen .fs-btn,#fs-wrap:-webkit-full-screen .fs-btn{
  position:fixed;bottom:16px;left:16px;z-index:100;
  background:rgba(0,0,0,.4);color:#fff;
}
#fs-wrap:fullscreen,#fs-wrap:-webkit-full-screen{
  background:#000;display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:12px;
  padding:16px;width:100vw;height:100vh;
}
#fs-wrap:fullscreen .hud,#fs-wrap:-webkit-full-screen .hud{
  max-width:960px;width:100%;flex-shrink:0;
}
#fs-wrap:fullscreen .canvas-wrap,#fs-wrap:-webkit-full-screen .canvas-wrap{
  flex:1 1 auto;width:100%;max-width:1200px;
  display:flex;align-items:center;justify-content:center;
}
#fs-wrap:fullscreen #game-canvas,#fs-wrap:-webkit-full-screen #game-canvas{
  max-height:100%;object-fit:contain;
}

/* Controls */
.controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:14px 18px}
.btn{
  padding:7px 18px;border-radius:10px;border:none;cursor:pointer;
  font-size:.82rem;font-weight:600;transition:all .15s;outline:none;
}
.btn-primary{background:rgba(59,130,246,.12);color:var(--accent-a);border:1px solid rgba(59,130,246,.25)}
.btn-primary:hover{background:rgba(59,130,246,.22)}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(180,205,255,.5)}
.btn-ghost:hover{background:rgba(180,205,255,.2)}
.sep{width:1px;height:24px;background:rgba(180,205,255,.5);margin:0 4px}
select{
  padding:7px 12px;border-radius:10px;border:1px solid rgba(180,205,255,.5);
  background:rgba(255,255,255,.7);color:var(--text);font-size:.82rem;
  font-weight:500;cursor:pointer;outline:none;
}
.mode-label,.speed-label,.model-label{font-size:.72rem;font-weight:600;color:var(--muted);white-space:nowrap}
.speed-wrap{display:flex;align-items:center;gap:8px}
#speed-slider{width:80px;cursor:pointer;accent-color:var(--accent-a)}
.controls-right{margin-left:auto;display:flex;align-items:center;gap:10px}

/* Customize panel */
.customize-toggle{
  display:inline-flex;align-items:center;gap:6px;cursor:pointer;
  font-size:.78rem;font-weight:600;color:var(--muted);padding:4px 12px;
  border-radius:8px;transition:all .15s;
}
.customize-toggle:hover{background:rgba(59,130,246,.08);color:var(--accent-a)}
.customize-body{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:10px 18px 14px}
.customize-body.hidden{display:none}
.cust-group{display:flex;align-items:center;gap:5px}
.cust-group label{font-size:.72rem;font-weight:600;color:var(--muted);white-space:nowrap}
.cust-group input[type=color]{width:28px;height:28px;border:2px solid rgba(180,205,255,.5);border-radius:6px;cursor:pointer;padding:0;background:none}
.cust-group input[type=color]:hover{border-color:var(--accent-a)}
.cust-preset{width:22px;height:22px;border-radius:50%;border:2px solid rgba(180,205,255,.4);cursor:pointer;transition:transform .12s}
.cust-preset:hover{transform:scale(1.15)}
.log-panel{padding:12px 18px;max-height:120px;overflow-y:auto}
.log-panel p{font-size:.76rem;color:var(--muted);margin:2px 0}
.log-panel .log-goal{color:#059669;font-weight:600}

/* Hint */
.hint{
  text-align:center;font-size:.78rem;color:var(--muted);padding:8px 16px;
  background:rgba(59,130,246,.06);border-radius:10px;
}
</style>
<script src="/static/sound.js"></script>
</head>
<body>
<nav>
  <span class="nav-brand">Agent Soccer</span>
  <div class="nav-links">
    <a href="/" class="nav-link active">Play</a>
    <a href="/online" class="nav-link">Online</a>
    <a href="/playground" class="nav-link">Playground</a>
    <a href="/tournaments" class="nav-link">Tournaments</a>
    <a href="/leaderboard" class="nav-link">Leaderboard</a>
    <a href="/profile" class="nav-link">Profile</a>
  </div>
  <span class="nav-user">{{ username }}</span>
    <a href="/auth/logout" class="nav-link" style="color:#ef4444;margin-left:8px">Logout</a>
</nav>

<main>
  <!-- Fullscreen wrapper includes HUD + canvas -->
  <div id="fs-wrap">
    <!-- HUD -->
    <div class="glass hud">
      <div class="team team-a">
        <div class="team-name">You</div>
        <div class="team-score" id="score-a">0</div>
      </div>
      <div class="hud-mid">
        <div class="turn-badge turn-a" id="turn-badge">Your turn</div>
        <div class="kick-counter" id="game-clock">00:00</div>
        <div class="winner-banner" id="winner-banner"></div>
      </div>
      <div class="team team-b">
        <div class="team-name">AI</div>
        <div class="team-score" id="score-b">0</div>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="game-canvas" width="1200" height="825"></canvas>
      <div class="canvas-overlay" id="canvas-overlay">
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
          <div class="spinner" id="overlay-spinner"></div>
          <span id="overlay-text">AI thinking…</span>
        </div>
      </div>
      <button class="fs-btn" id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
      <button class="sound-btn" id="sound-btn" onclick="SoundManager.toggleMute()">&#x1F50A;</button>
    </div>
  </div>

      <!-- Penalty shootout UI -->
      <div id="penalty-ui" style="display:none">
        <div id="penalty-keeper-btns" style="display:flex;gap:8px;justify-content:center;margin-top:8px">
          <button class="btn btn-primary" onclick="chooseKeeperDir('left')">← Left</button>
          <button class="btn btn-primary" onclick="chooseKeeperDir('center')">Center</button>
          <button class="btn btn-primary" onclick="chooseKeeperDir('right')">Right →</button>
        </div>
        <div id="penalty-keeper-timer" style="text-align:center;font-size:1.2rem;font-weight:700;color:var(--accent-a);margin-top:4px"></div>
        <div id="penalty-score" style="text-align:center;font-size:.9rem;font-weight:600;color:var(--muted);margin-top:4px"></div>
      </div>
      <div class="hint" id="hint-text">Drag any blue player backward (like a slingshot) then release to kick</div>

  <!-- Controls -->
  <div class="glass controls">
    <span class="mode-label">Mode</span>
    <select id="mode-select" onchange="setMode(this.value)">
      <option value="hvai">Human vs AI</option>
      <option value="hvh">Human vs Human</option>
      <option value="aivai">AI vs AI</option>
    </select>

    <div class="sep"></div>
    <span class="model-label">AI</span>
    <select id="model-select" onchange="switchModel(this.value)">
      <option value="greedy">Greedy Striker</option>
      <option value="minimax">Minimax</option>
      <option value="monte_carlo">Monte Carlo</option>
      <option value="bayesian">Bayesian</option>
      <option value="value_iteration">Value Iteration</option>
      <option value="policy_iteration">Policy Iteration</option>
      <option value="q_learning">Q-Learning</option>
    </select>

    <div class="sep"></div>
    <button class="btn btn-primary" onclick="resetGame()">New Game</button>
    <button class="btn btn-ghost" onclick="undoMove()">Undo</button>

    <div class="controls-right">
      <div class="speed-wrap">
        <span class="speed-label">Speed</span>
        <input type="range" id="speed-slider" min="0.3" max="3" step="0.1" value="1"
               oninput="setAnimSpeed(+this.value)">
      </div>
      <button class="btn btn-ghost" id="aivai-btn" style="display:none" onclick="triggerAI()">Run AI</button>
    </div>
  </div>

  <!-- Customize -->
  <div class="glass">
    <div class="customize-toggle" onclick="toggleCustomize()">🎨 Customize</div>
    <div class="customize-body hidden" id="cust-body">
      <div class="cust-group"><label>Team A</label><input type="color" value="#3b82f6" onchange="setColor('teamA',this.value)"></div>
      <div class="cust-group"><label>Team B</label><input type="color" value="#ef4444" onchange="setColor('teamB',this.value)"></div>
      <div class="cust-group"><label>Ref</label><input type="color" value="#fde68a" onchange="setColor('ref',this.value)"></div>
      <div class="cust-group"><label>Ball</label><input type="color" value="#f8fafc" onchange="setColor('ball',this.value)"></div>
      <div class="cust-group"><label>BG</label><input type="color" value="#2a2518" onchange="setColor('bg',this.value)"></div>
      <div class="sep"></div>
      <div class="cust-group"><label>Players</label>
        <input type="range" min="1" max="11" value="3" id="player-count" onchange="setPlayerCount(+this.value)" style="width:60px;cursor:pointer;accent-color:var(--accent-a)">
        <span id="player-count-label" style="font-size:.82rem;font-weight:600;color:var(--text);min-width:18px;text-align:center">3</span>
      </div>
      <div class="sep"></div>
      <span style="font-size:.72rem;font-weight:600;color:var(--muted)">Presets:</span>
      <div class="cust-preset" style="background:#3b82f6" onclick="setColor('teamA','#3b82f6')" title="Default Blue"></div>
      <div class="cust-preset" style="background:#22c55e" onclick="setColor('teamA','#22c55e')" title="Green"></div>
      <div class="cust-preset" style="background:#a855f7" onclick="setColor('teamA','#a855f7')" title="Purple"></div>
      <div class="cust-preset" style="background:#ef4444" onclick="setColor('teamB','#ef4444')" title="Default Red"></div>
      <div class="cust-preset" style="background:#f59e0b" onclick="setColor('teamB','#f59e0b')" title="Orange"></div>
      <div class="cust-preset" style="background:#06b6d4" onclick="setColor('teamB','#06b6d4')" title="Cyan"></div>
    </div>
  </div>

  <!-- Move Log -->
  <div class="glass log-panel" id="log-panel"></div>
</main>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const W = 1000, H = 625;
const PLAYER_R = 20, BALL_R = 12;
const GOAL_Y1 = 231, GOAL_Y2 = 394, GOAL_DEPTH = 50;
let TEAM_A_COLOR = '#3b82f6';
let TEAM_B_COLOR = '#ef4444';
let BALL_BASE_COLOR = '#f8fafc';
let REF_CENTER_COLOR = '#fde68a';
let REF_EDGE_COLOR = '#d97706';
let BG_CENTER_COLOR = '#2a2518';
let BG_MID_COLOR = '#1a1812';
let BG_EDGE_COLOR = '#080807';
const MAX_DRAG = 138;  // px on canvas scale
const PLAYER_TRAVEL = 3.0;  // must match _PLAYER_TRAVEL in soccer_logic.py

// ── Crowd data (generated once) ──
const _CC = ['#ef4444','#3b82f6','#f59e0b','#10b981','#8b5cf6','#ec4899','#f8fafc','#6366f1','#14b8a6','#f97316'];
let crowdDots = null;
function genCrowd() {
  crowdDots = [];
  // Top & bottom stands — full width, corners included
  for (let row = 0; row < 4; row++) {
    const yy = [6 + row * 4, H - 6 - row * 4];
    for (const y of yy) {
      for (let x = 8; x < W - 8; x += 8 + (row % 4)) {
        const jx = Math.sin(x * 0.37 + y * 0.13) * 2;
        const jy = Math.cos(x * 0.23 + y * 0.41) * 1.5;
        const c = _CC[Math.floor(Math.abs(Math.sin(x * 0.13 + y * 0.07 + row * 0.29)) * _CC.length)];
        crowdDots.push({x: x + jx, y: y + jy, c});
      }
    }
  }
  // Side stands — full height, corners included
  for (let row = 0; row < 4; row++) {
    const xx = [6 + row * 4, W - 6 - row * 4];
    for (const x of xx) {
      for (let y = 8; y < GOAL_Y1 - 4; y += 8 + (row % 4)) {
        const jx = Math.sin(x * 0.31 + y * 0.17) * 1.5;
        const jy = Math.cos(x * 0.19 + y * 0.43) * 2;
        const c = _CC[Math.floor(Math.abs(Math.sin(x * 0.11 + y * 0.17 + row * 0.23)) * _CC.length)];
        crowdDots.push({x: x + jx, y: y + jy, c});
      }
      for (let y = GOAL_Y2 + 4; y < H - 8; y += 8 + (row % 4)) {
        const jx = Math.sin(x * 0.31 + y * 0.17) * 1.5;
        const jy = Math.cos(x * 0.19 + y * 0.43) * 2;
        const c = _CC[Math.floor(Math.abs(Math.sin(x * 0.11 + y * 0.17 + row * 0.23)) * _CC.length)];
        crowdDots.push({x: x + jx, y: y + jy, c});
      }
    }
  }
}
let HOME_A = [{x:62,y:312},{x:400,y:244},{x:400,y:381}];
let HOME_B = [{x:938,y:312},{x:600,y:244},{x:600,y:381}];
let SHIRT = [1, 7, 10];

function genFormation(count) {
  const ha = [], hb = [], sh = [];
  const cx = W / 2, cy = H / 2;
  ha.push({x: W * 0.062, y: cy});
  hb.push({x: W * 0.938, y: cy});
  sh.push(1);
  if (count < 2) return {ha, hb, sh: sh.slice(0, count)};
  const outfield = count - 1;
  const fm = {1:[0,0,1],2:[1,0,1],3:[1,1,1],4:[2,0,2],5:[2,1,2],6:[3,1,2],7:[3,2,2],8:[4,2,2],9:[4,3,2],10:[4,3,3],11:[4,4,2]};
  let [nDef, nMid, nAtk] = fm[count] || [outfield, 0, 0];
  let tot = nDef + nMid + nAtk;
  if (tot > outfield) nAtk -= tot - outfield;
  else if (tot < outfield) nAtk += outfield - tot;

  const yRange = Math.min(H * 0.6, 80 + outfield * 25);
  const minY = cy - yRange / 2;

  function addRow(xA, xB, n) {
    for (let i = 0; i < n; i++) {
      const y = minY + (i + 0.5) / n * yRange;
      ha.push({x: xA, y}); hb.push({x: xB, y}); sh.push(i + 2);
    }
  }
  addRow(162, 838, nDef);
  addRow(281, 719, nMid);
  addRow(400, 600, nAtk);
  return {ha, hb, sh: sh.slice(0, count)};
}

// ── State ────────────────────────────────────────────────────────────────────
let gameState   = null;
let isAnimating = false;
let animSpeed   = 1.0;  // 1 = normal, higher = faster

let clockTimer = null;
function startClock() {
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(() => {
    if (!gameState) return;
    if (gameState.game_over) return;
    let elapsedReal = (Date.now() / 1000) - (gameState.start_time || (Date.now() / 1000));
    let totalSec = Math.floor(elapsedReal * 20);
    let m = Math.floor(totalSec / 60);
    let s = totalSec % 60;
    const period = gameState.period || 'regular';
    let display = `${m}:${String(s).padStart(2,'0')}`;
    if (period === 'et_first' || period === 'et_second') {
      display += ' ET';
    }
    const clk = document.getElementById('game-clock');
    if (clk) clk.textContent = display;
  }, 100);
}
startClock();

// Drag state (human)
let dragPlayer  = null;
let dragX       = 0, dragY = 0;
let lastPullX   = 0, lastPullY = 0;

// AI drag preview state — shown while AI is "aiming"
let aiDragPreview = null;  // {team, playerIdx, hx, hy, pullX, pullY, power, kickAngle}

// Shared animated ball position — set by animateTrajectory so render() picks it up
// even when called from animatePlayerMove (running in parallel).
let animBall = null;

// Canvas
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');

// Scale from CSS pixels → canvas pixels
function cssToCv(e) {
  const r  = canvas.getBoundingClientRect();
  const sx = 1000 / r.width;
  const sy = 700 / r.height;
  const x  = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const y  = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return { x: x * sx - 100, y: y * sy - 100 };
}

// ── Drawing ──────────────────────────────────────────────────────────────────
function drawField() {
  // Grass base
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, H);

  // Grass gradient
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0,   '#0f172a');
  grad.addColorStop(0.5, '#1e293b');
  grad.addColorStop(1,   '#0f172a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grass stripes
  ctx.fillStyle = 'rgba(0,0,0,.06)';
  for (let x = 0; x < W; x += 40) {
    ctx.fillRect(x, 0, 20, H);
  }

  // Stadium vignette (dark edges)
  const vig = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, 350);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,.6)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  // 3D recessed edge shadow — field looks slightly sunken
  ctx.strokeStyle = 'rgba(0,0,0,.35)';
  ctx.lineWidth = 8;
  ctx.strokeRect(20, 20, W-40, H-40);

  // ── Crowd ──
  if (crowdDots) {
    for (const d of crowdDots) {
      ctx.fillStyle = d.c;
      ctx.beginPath(); ctx.arc(d.x, d.y, 2, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(d.x - 2.5, d.y + 2, 5, 5);
      ctx.fillRect(d.x - 3, d.y + 6, 6, 2);
    }
  }

  ctx.save();

  // ── Line drop shadow (offset 1px down-right) ──
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(0,0,0,.18)';
  ctx.strokeRect(21, 21, W-42, H-42);
  ctx.beginPath(); ctx.moveTo(W/2+1, 21); ctx.lineTo(W/2+1, H-19); ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2+1, H/2+1, 60, 0, Math.PI*2); ctx.stroke();

  // ── Boundary / touchline ──
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.strokeRect(20, 20, W-40, H-40);

  // ── Center line ──
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(W/2, 20); ctx.lineTo(W/2, H-20); ctx.stroke();

  // ── Center circle ──
  ctx.beginPath(); ctx.arc(W/2, H/2, 60, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  ctx.beginPath(); ctx.arc(W/2, H/2, 4, 0, Math.PI*2); ctx.fill();

  // ── Corner arcs ──
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  for (const [cx, cy] of [[20,20],[W-20,20],[20,H-20],[W-20,H-20]]) {
    ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI/2); ctx.stroke();
  }

  // ── 3D corner flags ──
  for (const [cx, cy] of [[20,20],[W-20,20],[20,H-20],[W-20,H-20]]) {
    ctx.strokeStyle = 'rgba(255,255,255,.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx, cy-5); ctx.lineTo(cx, cy-13); ctx.stroke();
    ctx.fillStyle = '#ef4444';
    ctx.beginPath(); ctx.moveTo(cx, cy-11); ctx.lineTo(cx+5, cy-9); ctx.lineTo(cx, cy-7); ctx.closePath(); ctx.fill();
  }

  // ── Penalty areas (18-yard box) ──
  ctx.strokeRect(20, (H-180)/2, 100, 180);
  ctx.strokeRect(W-120, (H-180)/2, 100, 180);

  // ── Goal areas (6-yard box) ──
  const GA_W = 50, GA_D = 36;
  ctx.strokeStyle = 'rgba(255,255,255,.35)';
  ctx.strokeRect(20, GOAL_Y1 - GA_W, GA_D, GOAL_Y2 - GOAL_Y1 + GA_W * 2);
  ctx.strokeRect(W - 20 - GA_D, GOAL_Y1 - GA_W, GA_D, GOAL_Y2 - GOAL_Y1 + GA_W * 2);

  // ── Penalty spots ──
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.arc(120, H/2, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W-120, H/2, 4, 0, Math.PI*2); ctx.fill();

  // ── Penalty arcs (the "D") ──
  ctx.strokeStyle = 'rgba(255,255,255,.2)';
  ctx.beginPath(); ctx.arc(120, H/2, 32, -0.55, 0.55); ctx.stroke();
  ctx.beginPath(); ctx.arc(W-120, H/2, 32, Math.PI-0.55, Math.PI+0.55); ctx.stroke();

  // ── Goals ──
  (function drawBothGoals() {
    const gd = GOAL_DEPTH;
    for (const side of ['left', 'right']) {
      const frontX = side === 'left' ? 20 : W - 20;
      const backX  = side === 'left' ? 20 - gd : W - 20 + gd;
      const netW   = side === 'left' ? gd : gd;
      const netX   = side === 'left' ? frontX - gd : frontX;
      // Net fill
      ctx.fillStyle = 'rgba(255,255,255,.04)';
      ctx.fillRect(netX, GOAL_Y1, netW, GOAL_Y2 - GOAL_Y1);
      // Net grid
      ctx.strokeStyle = 'rgba(255,255,255,.1)';
      ctx.lineWidth = 0.6;
      for (let yy = GOAL_Y1 + 7; yy < GOAL_Y2; yy += 7) {
        ctx.beginPath(); ctx.moveTo(netX, yy); ctx.lineTo(frontX, yy); ctx.stroke();
      }
      for (let xx = netX + 5; xx < frontX; xx += 5) {
        ctx.beginPath(); ctx.moveTo(xx, GOAL_Y1); ctx.lineTo(xx, GOAL_Y2); ctx.stroke();
      }
      // Goal line (shadow + bright)
      ctx.strokeStyle = 'rgba(0,0,0,.25)';
      ctx.lineWidth = 4.5;
      ctx.beginPath(); ctx.moveTo(frontX+1, GOAL_Y1+1); ctx.lineTo(frontX+1, GOAL_Y2+1); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,.85)';
      ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.moveTo(frontX, GOAL_Y1); ctx.lineTo(frontX, GOAL_Y2); ctx.stroke();
      // 3D goal posts (cylindrical gradient)
      for (const [px, py, r] of [[frontX, GOAL_Y1, 4],[frontX, GOAL_Y2, 4]]) {
        const pg = ctx.createRadialGradient(px-1.5, py-1.5, 0.5, px, py, r);
        pg.addColorStop(0, '#ffffff');
        pg.addColorStop(0.5, '#e0e0e0');
        pg.addColorStop(1, '#999999');
        ctx.fillStyle = pg;
        ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
      }
      for (const [px, py, r] of [[backX, GOAL_Y1, 2.5],[backX, GOAL_Y2, 2.5]]) {
        const pg = ctx.createRadialGradient(px-1, py-1, 0.3, px, py, r);
        pg.addColorStop(0, '#cccccc');
        pg.addColorStop(1, '#666666');
        ctx.fillStyle = pg;
        ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
      }
    }
  })();

  ctx.restore();
}

function drawPlayer(x, y, team, label, highlight) {
  const col = team === 'a' ? TEAM_A_COLOR : TEAM_B_COLOR;

  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.25)';
  ctx.shadowBlur  = 8;
  ctx.shadowOffsetY = 3;

  // Outer glow if highlighted
  if (highlight) {
    ctx.beginPath();
    ctx.arc(x, y, PLAYER_R + 7, 0, Math.PI*2);
    ctx.fillStyle = col + '55';
    ctx.fill();
  }

  // Circle
  ctx.beginPath();
  ctx.arc(x, y, PLAYER_R, 0, Math.PI*2);
  const g2 = ctx.createRadialGradient(x-4, y-5, 2, x, y, PLAYER_R);
  g2.addColorStop(0, lighten(col));
  g2.addColorStop(1, col);
  ctx.fillStyle = g2;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Number
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Inter,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0;
  ctx.fillText(label, x, y);
  ctx.restore();
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}

function drawKeeper(x, y, team) {
  const col = team === 'a' ? '#22c55e' : '#f97316';
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.25)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 3;
  ctx.beginPath();
  ctx.arc(x, y, 18, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(x - 3, y - 4, 2, x, y, 18);
  g.addColorStop(0, lighten(col));
  g.addColorStop(1, col);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.6)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px Inter,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0;
  ctx.fillText('GK', x, y);
  ctx.restore();
}

function drawReferee(x, y) {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.25)';
  ctx.shadowBlur  = 6;
  ctx.shadowOffsetY = 2;
  ctx.beginPath();
  ctx.arc(x, y, 16, 0, Math.PI*2);
  const g = ctx.createRadialGradient(x-3, y-4, 2, x, y, 16);
  g.addColorStop(0, REF_CENTER_COLOR);
  g.addColorStop(1, REF_EDGE_COLOR);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.7)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px Inter,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('REF', x, y + 0.5);
  ctx.restore();
}

function drawSoccerBall(x, y, r) {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.3)';
  ctx.shadowBlur  = 10;
  ctx.shadowOffsetY = 4;

  // White base
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = BALL_BASE_COLOR;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.25)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  // Center pentagon
  ctx.fillStyle = '#1e293b';
  const pr = r * 0.38;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 2 * Math.PI / 5) - Math.PI / 2;
    const px = x + pr * Math.cos(a);
    const py = y + pr * Math.sin(a);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();

  // 5 surrounding patches
  ctx.fillStyle = '#1e293b';
  for (let i = 0; i < 5; i++) {
    const a = (i * 2 * Math.PI / 5) + Math.PI / 2;
    const px = x + r * 0.62 * Math.cos(a);
    const py = y + r * 0.62 * Math.sin(a);
    ctx.beginPath();
    ctx.arc(px, py, r * 0.22, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.restore();
}

// Compute capped pull info from home + raw drag position
function calcPull(home) {
  const ddx = dragX - home.x, ddy = dragY - home.y;
  const dist = Math.sqrt(ddx*ddx + ddy*ddy);
  const capped = Math.min(MAX_DRAG, dist);
  const ratio  = dist > 0 ? capped / dist : 0;
  const pullX  = home.x + ddx * ratio;
  const pullY  = home.y + ddy * ratio;
  return {
    pullX, pullY,
    power:     capped / MAX_DRAG * 100,
    kickAngle: Math.atan2(home.y - pullY, home.x - pullX),  // radians
  };
}

function drawDragVisuals(hx, hy, pullX, pullY, power, kickAngle, cx, cy) {
  // kickAngle points FROM pull TOWARD home = kick direction
  ctx.save();
  ctx.lineCap = 'round';

  // Rubber band: two lines from HOME position backward to pull point
  // (player stays at home; band shows stretch going behind it)
  const perp = kickAngle + Math.PI / 2;
  const spread = 11;
  ctx.strokeStyle = 'rgba(251,146,60,.92)';
  ctx.lineWidth   = 3;
  ctx.setLineDash([]);
  for (const sign of [1, -1]) {
    const bx = hx + Math.cos(perp) * spread * sign;
    const by = hy + Math.sin(perp) * spread * sign;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(pullX, pullY); ctx.stroke();
  }

  // Kick-direction arrow: from home outward in kick direction
  const arrowLen = 46 + power * 0.72;
  const ax = hx + Math.cos(kickAngle) * arrowLen;
  const ay = hy + Math.sin(kickAngle) * arrowLen;
  ctx.strokeStyle = 'rgba(255,255,255,.88)';
  ctx.lineWidth   = 2.5;
  ctx.setLineDash([10, 5]);
  ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(ax, ay); ctx.stroke();

  // Arrowhead
  ctx.setLineDash([]);
  const hl = 15, ha = 0.42;
  ctx.fillStyle = 'rgba(255,255,255,.95)';
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax - hl*Math.cos(kickAngle-ha), ay - hl*Math.sin(kickAngle-ha));
  ctx.lineTo(ax - hl*Math.cos(kickAngle+ha), ay - hl*Math.sin(kickAngle+ha));
  ctx.closePath(); ctx.fill();

  // Power bar near the pull point — drawn in absolute canvas coords
  // so it stays visible even when cursor is outside the field
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);  // reset to absolute canvas space
  const bw = 60, bh = 10;
  const barX = (cx + 100) - bw/2;  // +100 = field-to-canvas offset
  const barY = (cy + 100) - 34;
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.beginPath(); ctx.roundRect(barX, barY, bw, bh, 5); ctx.fill();
  const col = power > 70 ? '#ef4444' : power > 40 ? '#f59e0b' : '#22c55e';
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.roundRect(barX, barY, bw * power/100, bh, 5); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(barX, barY, bw, bh, 5); ctx.stroke();
  // Power percentage text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px Inter,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(Math.round(power) + '%', barX + bw/2, barY + bh/2);
  ctx.restore();

  ctx.restore();
}

function render(ballOverride) {
  if (!gameState) return;
  ctx.clearRect(0, 0, 1200, 825);

  // Warm floodlit glow
  ctx.save();
  const bgGrad = ctx.createRadialGradient(600, 412, 60, 600, 412, 850);
  bgGrad.addColorStop(0, BG_CENTER_COLOR);
  bgGrad.addColorStop(0.3, BG_MID_COLOR);
  bgGrad.addColorStop(1, BG_EDGE_COLOR);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, 1200, 825);
  ctx.restore();

  ctx.save();
  ctx.translate(100, 100);

  drawField();

  const ball = ballOverride || animBall || gameState.ball;
  const isA  = gameState.is_player_a;
  const mode = gameState.game_mode;
  const over = gameState.game_over;

  // Compute pull info now (needed to know where to draw dragged player)
  let pull = null;
  if (dragPlayer !== null) {
    const home = gameState.players_a[dragPlayer];
    pull = { hx: home.x, hy: home.y, ...calcPull(home) };
  }

  // Penalty mode — only draw keeper + kicker, not all outfielders
  if (gameState.penalty_shootout) {
    const kickTeam = isA ? 'a' : 'b';
    const defTeam = isA ? 'b' : 'a';
    const defPlayers = isA ? gameState.players_b : gameState.players_a;
    if (defPlayers.length) drawKeeper(defPlayers[0].x, defPlayers[0].y, defTeam);
    const attPlayers = isA ? gameState.players_a : gameState.players_b;
    attPlayers.forEach((p, i) => drawPlayer(p.x, p.y, kickTeam, SHIRT[i], false));
  } else {
    // Players B — highlight the AI's chosen player during its drag preview
    const aiB = aiDragPreview && aiDragPreview.team === 'b' ? aiDragPreview.playerIdx : -1;
    gameState.players_b.forEach((p, i) => drawPlayer(p.x, p.y, 'b', SHIRT[i], i === aiB));

    // Players A — always drawn at home; dragged player highlighted; also AI-A preview
    const canSelectA = !over && !isAnimating && isA && (mode === 'hvai' || mode === 'hvh');
    const aiA = aiDragPreview && aiDragPreview.team === 'a' ? aiDragPreview.playerIdx : -1;
    gameState.players_a.forEach((p, i) => {
      const hl = (canSelectA && dragPlayer === null) || i === dragPlayer || i === aiA;
      drawPlayer(p.x, p.y, 'a', SHIRT[i], hl);
    });
  }

  // Referee (static yellow figure)
  if (gameState.referee) {
    drawReferee(gameState.referee.x, gameState.referee.y);
  }

  // Ball
  drawSoccerBall(ball.x, ball.y, BALL_R);

  // Human drag visuals (rubber band + arrow)
  if (pull !== null) {
    drawDragVisuals(pull.hx, pull.hy, pull.pullX, pull.pullY, pull.power, pull.kickAngle, dragX, dragY);
  }

  // AI drag preview — same visual style as human, so the AI "shows its aim"
  if (aiDragPreview !== null) {
    const d = aiDragPreview;
    drawDragVisuals(d.hx, d.hy, d.pullX, d.pullY, d.power, d.kickAngle, d.pullX, d.pullY);
  }

  ctx.restore();
}

// ── HUD updates ──────────────────────────────────────────────────────────────
function updateHUD(st) {
  document.getElementById('score-a').textContent = st.score_a;
  document.getElementById('score-b').textContent = st.score_b;

  const tb   = document.getElementById('turn-badge');
  const hint = document.getElementById('hint-text');
  const wb   = document.getElementById('winner-banner');
  const over = st.game_over;

  // Penalty shootout UI
  const pUI = document.getElementById('penalty-ui');
  const keeperBtns = document.getElementById('penalty-keeper-btns');
  const keeperTimer = document.getElementById('penalty-keeper-timer');
  const pScore = document.getElementById('penalty-score');
  if (st.penalty_shootout && !over) {
    pUI.style.display = 'block';
    const isA = st.is_player_a;
    const m = st.game_mode;
    pScore.textContent = 'Penalty ' + (st.penalty_kick_num + 1) + '/' + (st.penalty_kicks || 5) +
      ' — A: ' + st.penalty_a_score + ' / B: ' + st.penalty_b_score;
    if (m === 'hvai' && !isA) {
      keeperBtns.style.display = 'flex';
      startKeeperTimer();
    } else {
      keeperBtns.style.display = 'none';
      keeperTimer.textContent = '';
      if (keepTimer) { clearInterval(keepTimer); keepTimer = null; }
    }
  } else {
    pUI.style.display = 'none';
  }

  if (over) {
    wb.style.display = 'block';
    const w = st.winner;
    wb.textContent = w === 'A' ? 'You win!' : w === 'B' ? 'AI wins!' : "It's a draw!";
    wb.style.color  = w === 'A' ? '#059669' : w === 'B' ? '#ef4444' : '#6b7fa3';
    tb.style.display = 'none';
    hint.textContent = 'Game over — click New Game to play again';
    if (!window._whistlePlayed) { window._whistlePlayed = true; SoundManager.whistle(); }
  } else {
    window._whistlePlayed = false;
    wb.style.display = 'none';
    tb.style.display = '';
    const isA = st.is_player_a;
    const mode = st.game_mode;
    if (st.penalty_shootout) {
      if (mode === 'hvai') {
        tb.textContent  = isA ? 'Your penalty kick!' : 'Choose goalkeeper direction…';
        tb.className    = 'turn-badge ' + (isA ? 'turn-a' : 'turn-b');
        hint.textContent = isA
          ? 'Drag a blue player backward then release to kick toward the right goal'
          : 'Click Left, Center, or Right to set your goalkeeper\'s dive direction';
      } else if (mode === 'hvh') {
        tb.textContent  = isA ? 'Team A penalty' : 'Team B penalty';
        tb.className    = 'turn-badge ' + (isA ? 'turn-a' : 'turn-b');
        hint.textContent = isA ? 'Team A kicks' : 'Team B kicks';
      } else {
        tb.textContent  = isA ? 'Team A (AI)' : 'Team B (AI)';
        tb.className    = 'turn-badge ' + (isA ? 'turn-a' : 'turn-b');
        hint.textContent = 'AI penalty shootout';
      }
    } else if (mode === 'hvai') {
      tb.textContent  = isA ? 'Your turn' : 'AI thinking…';
      tb.className    = 'turn-badge ' + (isA ? 'turn-a' : 'turn-b');
      hint.textContent = isA
        ? 'Drag a blue player backward then release to kick toward the right goal'
        : 'AI is calculating its shot…';
    } else if (mode === 'hvh') {
      tb.textContent  = isA ? 'Team A turn' : 'Team B turn';
      tb.className    = 'turn-badge ' + (isA ? 'turn-a' : 'turn-b');
      hint.textContent = isA
        ? 'Team A: drag a blue player to kick right'
        : 'Team B: click Run AI or wait for human to drag a red player';
    } else {
      tb.textContent  = isA ? 'Team A (AI)' : 'Team B (AI)';
      tb.className    = 'turn-badge ' + (isA ? 'turn-a' : 'turn-b');
      hint.textContent = 'AI vs AI — press Run AI to start auto-play';
    }
  }

  const aiBtn = document.getElementById('aivai-btn');
  aiBtn.style.display = (st.game_mode === 'aivai' || (st.game_mode === 'hvh' && !st.is_player_a)) ? '' : 'none';
}

function logMove(text, isGoal) {
  const panel = document.getElementById('log-panel');
  const p = document.createElement('p');
  if (isGoal) p.className = 'log-goal';
  p.textContent = text;
  panel.prepend(p);
  while (panel.children.length > 20) panel.lastChild.remove();
}

// ── Animation ────────────────────────────────────────────────────────────────
// Lerp helper
function lerp(a, b, t) { return a + (b - a) * t; }

function animateTrajectory(trajectory, onDone) {
  if (!trajectory || trajectory.length === 0) { animBall = null; onDone(); return; }
  if (trajectory.length === 1) {
    const pt = trajectory[0];
    animBall = { x: pt.x, y: pt.y };
    if (pt.a && pt.b && gameState && gameState.players_a && gameState.players_b) {
      for (let k = 0; k < 3; k++) {
        gameState.players_a[k].x = pt.a[k].x;
        gameState.players_a[k].y = pt.a[k].y;
        gameState.players_b[k].x = pt.b[k].x;
        gameState.players_b[k].y = pt.b[k].y;
      }
    }
    render();
    animBall = null;
    onDone();
    return;
  }

  const msPerSegment = Math.max(8, 24 / animSpeed);
  const totalSegments = trajectory.length - 1;
  let startTime = null;
  let prevBounceIdx = -1;

  function frame(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = timestamp - startTime;
    const progress = Math.min(elapsed / msPerSegment, totalSegments);
    const segIdx = Math.min(Math.floor(progress), totalSegments - 1);
    const segFrac = progress - segIdx;

    // Bounce sound
    if (segIdx !== prevBounceIdx && segIdx < trajectory.length && trajectory[segIdx].b) {
      SoundManager.bounce();
    }
    prevBounceIdx = segIdx;

    const ptA = trajectory[segIdx];
    const ptB = trajectory[segIdx + 1];

    // Interpolate ball position
    animBall = {
      x: lerp(ptA.x, ptB.x, segFrac),
      y: lerp(ptA.y, ptB.y, segFrac),
    };

    // Interpolate all player positions
    if (ptA.a && ptA.b && ptB.a && ptB.b && gameState && gameState.players_a && gameState.players_b) {
      for (let k = 0; k < 3; k++) {
        gameState.players_a[k].x = lerp(ptA.a[k].x, ptB.a[k].x, segFrac);
        gameState.players_a[k].y = lerp(ptA.a[k].y, ptB.a[k].y, segFrac);
        gameState.players_b[k].x = lerp(ptA.b[k].x, ptB.b[k].x, segFrac);
        gameState.players_b[k].y = lerp(ptA.b[k].y, ptB.b[k].y, segFrac);
      }
    }

    render();

    if (progress < totalSegments) {
      requestAnimationFrame(frame);
    } else {
      // Snap to final frame exactly
      const last = trajectory[trajectory.length - 1];
      if (last.a && last.b && gameState && gameState.players_a && gameState.players_b) {
        for (let k = 0; k < 3; k++) {
          gameState.players_a[k].x = last.a[k].x;
          gameState.players_a[k].y = last.a[k].y;
          gameState.players_b[k].x = last.b[k].x;
          gameState.players_b[k].y = last.b[k].y;
        }
      }
      animBall = null;
      onDone();
    }
  }
  requestAnimationFrame(frame);
}

// Rocket player from fromPos to toPos, stays there permanently.
function animatePlayerMove(playerIdx, team, fromPos, toPos, onDone) {
  const players = team === 'a' ? gameState.players_a : gameState.players_b;
  const p = players[playerIdx];
  p.x = fromPos.x; p.y = fromPos.y;
  const duration = Math.max(60, 192 / animSpeed); // ms
  let startTime = null;

  function tick(timestamp) {
    if (!startTime) startTime = timestamp;
    const t = Math.min((timestamp - startTime) / duration, 1.0);
    const ease = 1 - Math.pow(1 - t, 2);  // ease-out
    p.x = fromPos.x + (toPos.x - fromPos.x) * ease;
    p.y = fromPos.y + (toPos.y - fromPos.y) * ease;
    render();
    if (t < 1.0) requestAnimationFrame(tick);
    else { p.x = toPos.x; p.y = toPos.y; onDone(); }
  }
  requestAnimationFrame(tick);
}

// Show AI "aiming" — rubber band pulls back then releases. aiDragPreview drives render().
function showAIDragPreview(playerIdx, team, angleDeg, power, onDone) {
  const players = team === 'a' ? gameState.players_a : gameState.players_b;
  const p = players[playerIdx];
  const hx = p.x, hy = p.y;

  // Pull direction is OPPOSITE of kick (slingshot: pull back to shoot forward)
  const pullRad = (angleDeg + 180) * Math.PI / 180;
  const pullDist = (power / 100) * MAX_DRAG;
  const targetPX = hx + Math.cos(pullRad) * pullDist;
  const targetPY = hy + Math.sin(pullRad) * pullDist;
  const kickRad  = angleDeg * Math.PI / 180;

  aiDragPreview = { team, playerIdx, hx, hy, pullX: hx, pullY: hy, power: 0, kickAngle: kickRad };

  const PULL_STEPS = 22;
  let t = 0;

  function pullTick() {
    t++;
    const frac = t / PULL_STEPS;
    aiDragPreview.pullX  = hx + (targetPX - hx) * frac;
    aiDragPreview.pullY  = hy + (targetPY - hy) * frac;
    aiDragPreview.power  = power * frac;
    render();
    if (t < PULL_STEPS) setTimeout(pullTick, 18 / animSpeed);
    else setTimeout(releaseTick, 160 / animSpeed);  // brief hold at full stretch
  }

  function releaseTick() {
    aiDragPreview = null;
    render();
    onDone();
  }

  pullTick();
}

// ── Move submission ───────────────────────────────────────────────────────────

// Client-side kick endpoint (mirrors server physics) — used so we can animate
// the player flying forward even when the server has already reset them to HOME.
function kickEndpoint(from, angleDeg, power) {
  const rad = angleDeg * Math.PI / 180;
  const travel = power * PLAYER_TRAVEL;
  return {
    x: Math.max(PLAYER_R, Math.min(W - PLAYER_R, from.x + Math.cos(rad) * travel)),
    y: Math.max(PLAYER_R, Math.min(H - PLAYER_R, from.y + Math.sin(rad) * travel)),
  };
}

// After a goal: smoothly slide all 6 players back to their kickoff positions.
function animateKickoff(onDone) {
  const fromA = gameState.players_a.map(p => ({x: p.x, y: p.y}));
  const fromB = gameState.players_b.map(p => ({x: p.x, y: p.y}));
  const duration = Math.max(120, 264 / animSpeed); // ms
  let startTime = null;

  function tick(timestamp) {
    if (!startTime) startTime = timestamp;
    const t = Math.min((timestamp - startTime) / duration, 1.0);
    const ease = 1 - Math.pow(1 - t, 2);
    gameState.players_a.forEach((p, i) => {
      p.x = fromA[i].x + (HOME_A[i].x - fromA[i].x) * ease;
      p.y = fromA[i].y + (HOME_A[i].y - fromA[i].y) * ease;
    });
    gameState.players_b.forEach((p, i) => {
      p.x = fromB[i].x + (HOME_B[i].x - fromB[i].x) * ease;
      p.y = fromB[i].y + (HOME_B[i].y - fromB[i].y) * ease;
    });
    render();
    if (t < 1.0) requestAnimationFrame(tick);
    else {
      gameState.players_a.forEach((p, i) => { p.x = HOME_A[i].x; p.y = HOME_A[i].y; });
      gameState.players_b.forEach((p, i) => { p.x = HOME_B[i].x; p.y = HOME_B[i].y; });
      onDone();
    }
  }
  requestAnimationFrame(tick);
}

// After a trajectory animation ends, patch gameState.ball to the last drawn point.
// Without this, the next render() would snap the ball back to its pre-kick position.
function syncBall(trajectory, scored) {
  if (!trajectory || trajectory.length === 0) return;
  const last = trajectory[trajectory.length - 1];
  // If a goal was scored the ball resets to centre; otherwise stay at final spot.
  gameState.ball = scored ? { x: 500, y: 312 } : { x: last.x, y: last.y };
}

let keepTimer = null;

function startKeeperTimer() {
  if (keepTimer) clearTimeout(keepTimer);
  let sec = 5;
  const el = document.getElementById('penalty-keeper-timer');
  if (!el) return;
  el.textContent = 'Choose direction (' + sec + 's)';
  keepTimer = setInterval(() => {
    sec--;
    if (sec <= 0) {
      clearInterval(keepTimer); keepTimer = null;
      el.textContent = 'Auto-choosing center!';
      chooseKeeperDir('center');
    } else {
      el.textContent = 'Choose direction (' + sec + 's)';
    }
  }, 1000);
}

async function chooseKeeperDir(dir) {
  await fetch('/goalkeeper_move', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ direction: dir }),
  });
  document.getElementById('penalty-keeper-btns').style.display = 'none';
  document.getElementById('penalty-keeper-timer').textContent = 'Goalkeeper set!';
  await triggerAI();
}

async function submitKick(playerIdx, angleDeg, power, pullX, pullY) {
  isAnimating = true;
  setOverlay(false);

  // Capture current player position before server updates it
  const fromPosA = { x: gameState.players_a[playerIdx].x, y: gameState.players_a[playerIdx].y };

  // Save all player positions before trajectory anim (needed for goal kickoff slide-back)
  const _preKickA = gameState.players_a.map(p => ({x: p.x, y: p.y}));
  const _preKickB = gameState.players_b.map(p => ({x: p.x, y: p.y}));

  const resp = await fetch('/move', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ player_idx: playerIdx, angle: angleDeg, power }),
  });
  const data = await resp.json();

  // Player snaps forward, then ball rolls visibly across the field
  if (data.move_result) {
    const mr = data.move_result;
    const kickEndA = mr.kick_endpoint || kickEndpoint(fromPosA, angleDeg, power);
    

    await new Promise(r => animateTrajectory(mr.trajectory, r));
    if (mr.push_result) {
      const pr = mr.push_result;
      await new Promise(r => animatePlayerMove(pr.player_idx, pr.team, pr.from, pr.to, r));
    }
    const isPenalty = data.penalty_shootout;
    syncBall(mr.trajectory, mr.scored);
    logMove(mr.desc, !!mr.scored);
    if (mr.scored && !isPenalty) {
      SoundManager.goal();
      await new Promise(r => setTimeout(r, 400 / animSpeed));
      // Restore pre-kick positions so animateKickoff slides them back visibly
      gameState.players_a.forEach((p, i) => { p.x = _preKickA[i].x; p.y = _preKickA[i].y; });
      gameState.players_b.forEach((p, i) => { p.x = _preKickB[i].x; p.y = _preKickB[i].y; });
      await new Promise(r => animateKickoff(r));
    }
  }

  // AI thinks while human's move was animating — now fetch its response
  if (!data.game_over && data.game_mode === 'hvai' && !data.is_player_a && !data.penalty_shootout) {
    const aiResp = await fetch('/ai_move', { method: 'POST' });
    const aiData = await aiResp.json();
    if (aiData.ai_result) {
      const ai = aiData.ai_result;
      if (!aiData.penalty_shootout) {
        await new Promise(r => setTimeout(r, 160 / animSpeed));
        await new Promise(r => showAIDragPreview(ai.player_idx, 'b', ai.angle, ai.power, r));
      }

      const _preAIA = aiData.players_a.map(p => ({x: p.x, y: p.y}));
      const _preAIB = aiData.players_b.map(p => ({x: p.x, y: p.y}));
      await new Promise(r => animateTrajectory(ai.trajectory, r));
      if (ai.push_result) {
        const pr = ai.push_result;
        await new Promise(r => animatePlayerMove(pr.player_idx, pr.team, pr.from, pr.to, r));
      }
      syncBall(ai.trajectory, ai.scored);
      logMove(ai.desc, !!ai.scored);
      if (ai.scored && !aiData.penalty_shootout) {
        SoundManager.goal();
        await new Promise(r => setTimeout(r, 400 / animSpeed));
        aiData.players_a.forEach((p, i) => { p.x = _preAIA[i].x; p.y = _preAIA[i].y; });
        aiData.players_b.forEach((p, i) => { p.x = _preAIB[i].x; p.y = _preAIB[i].y; });
        await new Promise(r => animateKickoff(r));
      }
    }
    gameState = aiData;
    isAnimating = false;
    render();
    updateHUD(aiData);
  } else {
    gameState = data;
    isAnimating = false;
    render();
    updateHUD(data);
  }
}

async function triggerAI() {
  if (isAnimating || (gameState && gameState.game_over)) return;
  isAnimating = true;
  // No overlay — it causes a visible flash between AI turns

  const resp = await fetch('/ai_move', { method: 'POST' });
  const data = await resp.json();

  if (data.ai_result) {
    const ai = data.ai_result;
    const isPenalty = data.penalty_shootout;
    if (!isPenalty) {
      const team = data.is_player_a ? 'b' : 'a';
      await new Promise(r => showAIDragPreview(ai.player_idx, team, ai.angle, ai.power, r));
    }
    await new Promise(r => animateTrajectory(ai.trajectory, r));
    if (ai.push_result) {
      const pr = ai.push_result;
      await new Promise(r => animatePlayerMove(pr.player_idx, pr.team, pr.from, pr.to, r));
    }
    syncBall(ai.trajectory, ai.scored);
    logMove(ai.desc, !!ai.scored);
    if (ai.scored && !isPenalty) {
      await new Promise(r => setTimeout(r, 400 / animSpeed));
      await new Promise(r => animateKickoff(r));
    }
  }

  gameState = data;
  isAnimating = false;
  render();
  updateHUD(data);

  // In AI vs AI mode keep running automatically until the game ends
  if (data.game_mode === 'aivai' && !data.game_over) {
    setTimeout(triggerAI, 80);
  }
}

// ── Controls ─────────────────────────────────────────────────────────────────
async function resetGame() {
  if (isAnimating) return;
  const pc = +document.getElementById('player-count').value;
  const data = await fetch('/reset', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({player_count: pc})}).then(r=>r.json());
  gameState = data;
  // Sync formation to the returned player count
  const f = genFormation(data.player_count || pc);
  HOME_A = f.ha; HOME_B = f.hb; SHIRT = f.sh;
  if (document.getElementById('player-count')) document.getElementById('player-count').value = data.player_count || pc;
  if (document.getElementById('player-count-label')) document.getElementById('player-count-label').textContent = data.player_count || pc;
  document.getElementById('log-panel').innerHTML = '';
  render();
  updateHUD(data);
}

async function undoMove() {
  if (isAnimating) return;
  const data = await fetch('/undo', {method:'POST'}).then(r=>r.json());
  gameState = data;
  render();
  updateHUD(data);
}

async function setMode(mode) {
  if (isAnimating) return;
  await fetch('/set_mode', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode})});
  const data = await fetch('/state').then(r=>r.json());
  gameState = data;
  // Sync formation to returned player count
  const f = genFormation(data.player_count || 3);
  HOME_A = f.ha; HOME_B = f.hb; SHIRT = f.sh;
  if (document.getElementById('player-count')) document.getElementById('player-count').value = data.player_count || 3;
  if (document.getElementById('player-count-label')) document.getElementById('player-count-label').textContent = data.player_count || 3;
  render();
  updateHUD(data);
}

async function switchModel(name) {
  await fetch('/switch_model', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:name,target:'b'})});
}

function setAnimSpeed(v) { animSpeed = v; }

function toggleFullscreen() {
  const el = document.getElementById('fs-wrap');
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  } else {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }
}

function setOverlay(show, text='AI thinking…') {
  const el = document.getElementById('canvas-overlay');
  el.classList.toggle('visible', show);
  if (show) document.getElementById('overlay-text').textContent = text;
}

// ── Drag / Slingshot input ────────────────────────────────────────────────────
function getHoveredPlayer(cx, cy) {
  if (!gameState || gameState.game_over || isAnimating) return null;
  const isA  = gameState.is_player_a;
  const mode = gameState.game_mode;
  const players = (isA || mode === 'hvh') ? gameState.players_a : null;
  if (!players) return null;
  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    const d = Math.hypot(p.x - cx, p.y - cy);
    if (d < PLAYER_R + 8) return i;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const {x, y} = cssToCv(e);
  const idx = getHoveredPlayer(x, y);
  if (idx !== null) {
    dragPlayer = idx;
    dragX = x; dragY = y;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  }
});

window.addEventListener('mousemove', e => {
  if (dragPlayer !== null) {
    const {x, y} = cssToCv(e);
    dragX = x; dragY = y;
    render();
    e.preventDefault();
  } else if (e.target === canvas) {
    const {x, y} = cssToCv(e);
    const idx = getHoveredPlayer(x, y);
    canvas.style.cursor = idx !== null ? 'grab' : 'default';
  }
});

window.addEventListener('mouseup', e => {
  if (dragPlayer === null) return;
  const {x, y} = cssToCv(e);
  dragX = x; dragY = y;
  const home = gameState.players_a[dragPlayer];
  const {pullX, pullY, power, kickAngle} = calcPull(home);
  const idx = dragPlayer;
  dragPlayer = null;
  canvas.style.cursor = 'default';
  render();
  if (power > 5) {
    submitKick(idx, kickAngle * 180 / Math.PI, power, pullX, pullY);
  }
});

// Touch support
canvas.addEventListener('touchstart', e => {
  const {x, y} = cssToCv(e);
  const idx = getHoveredPlayer(x, y);
  if (idx !== null) { dragPlayer = idx; dragX = x; dragY = y; e.preventDefault(); }
}, {passive:false});

window.addEventListener('touchmove', e => {
  if (dragPlayer !== null) {
    const {x, y} = cssToCv(e);
    dragX = x; dragY = y; render();
    if(e.cancelable) e.preventDefault();
  }
}, {passive:false});

window.addEventListener('touchend', e => {
  if (dragPlayer === null) return;
  const touch = e.changedTouches[0];
  const r = canvas.getBoundingClientRect();
  dragX = (touch.clientX - r.left) * W / r.width;
  dragY = (touch.clientY - r.top)  * H / r.height;
  const home = gameState.players_a[dragPlayer];
  const {pullX, pullY, power, kickAngle} = calcPull(home);
  const idx = dragPlayer;
  dragPlayer = null; render();
  if (power > 5) submitKick(idx, kickAngle * 180 / Math.PI, power, pullX, pullY);
}, {passive:false});

function toggleCustomize() {
  document.getElementById('cust-body').classList.toggle('hidden');
}
function setColor(what, val) {
  switch (what) {
    case 'teamA': TEAM_A_COLOR = val; break;
    case 'teamB': TEAM_B_COLOR = val; break;
    case 'ref': REF_CENTER_COLOR = val; break;
    case 'ball': BALL_BASE_COLOR = val; break;
    case 'bg': BG_CENTER_COLOR = val; break;
  }
  const input = document.querySelector(`.cust-group input[onchange*="${what}"]`);
  if (input) input.value = val;
  render();
}
function setPlayerCount(n) {
  document.getElementById('player-count-label').textContent = n;
  const f = genFormation(n);
  HOME_A = f.ha;
  HOME_B = f.hb;
  SHIRT = f.sh;
  resetGame();
}

(async () => {
  const data = await fetch('/state').then(r => r.json());
  // Populate model selector
  try {
    const models = await fetch('/models').then(r => r.json());
    const sel = document.getElementById('model-select');
    sel.innerHTML = '';
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id; opt.textContent = m.name;
      if (m.id === data.ai_model) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch(e) {}

  // Set mode select
  document.getElementById('mode-select').value = data.game_mode || 'hvai';

  gameState = data;
  // Sync formation to returned player count
  const f = genFormation(data.player_count || 3);
  HOME_A = f.ha; HOME_B = f.hb; SHIRT = f.sh;
  if (document.getElementById('player-count')) document.getElementById('player-count').value = data.player_count || 3;
  if (document.getElementById('player-count-label')) document.getElementById('player-count-label').textContent = data.player_count || 3;
  genCrowd();
  render();
  updateHUD(data);
})();
