<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agent Soccer</title>
<style>
:root{
  --glass-bg:rgba(255,255,255,.62);
  --glass-border:rgba(180,205,255,.5);
  --glass-shadow:0 8px 32px rgba(80,120,200,.10),inset 0 1px 0 rgba(255,255,255,.95);
  --blur:18px;
  --accent-a:#3b82f6;
  --accent-b:#ef4444;
  --text:#1e2d4f;
  --muted:#6b7fa3;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:linear-gradient(145deg,#e0eaff 0%,#ede9fe 45%,#d1fae5 100%);
  font-family:'Inter',system-ui,sans-serif;
  color:var(--text);
}
.glass{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
  backdrop-filter:blur(var(--blur));
  -webkit-backdrop-filter:blur(var(--blur));
  border-radius:18px;
}
nav{
  display:flex;align-items:center;gap:12px;padding:10px 24px;
  background:rgba(255,255,255,.78);
  border-bottom:1px solid rgba(180,205,255,.4);
  position:sticky;top:0;z-index:100;
}
.nav-brand{font-weight:700;font-size:1rem;color:var(--text)}
.nav-links{display:flex;gap:4px;margin-left:auto}
.nav-link{
  padding:6px 14px;border-radius:8px;font-size:.82rem;font-weight:500;
  color:var(--muted);text-decoration:none;transition:all .15s;
}
.nav-link:hover,.nav-link.active{background:rgba(59,130,246,.1);color:var(--accent-a)}
.nav-user{font-size:.82rem;color:var(--muted);padding:6px 0 6px 12px;border-left:1px solid rgba(180,205,255,.4)}
main{max-width:1000px;margin:0 auto;padding:24px 16px;display:flex;flex-direction:column;gap:16px}

/* Score HUD */
.hud{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
}
.team{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:110px}
.team-name{font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.team-score{font-size:2.4rem;font-weight:800;line-height:1}
.team-a .team-score{color:var(--accent-a)}
.team-b .team-score{color:var(--accent-b)}
.hud-mid{display:flex;flex-direction:column;align-items:center;gap:6px}
.kick-counter{font-size:.72rem;color:var(--muted);font-weight:500}
.turn-badge{
  padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:600;
}
.turn-badge.turn-a{background:rgba(59,130,246,.15);color:var(--accent-a)}
.turn-badge.turn-b{background:rgba(239,68,68,.15);color:var(--accent-b)}
.winner-banner{
  display:none;padding:8px 20px;border-radius:12px;font-size:.9rem;font-weight:700;
  background:rgba(16,185,129,.15);color:#059669;text-align:center;
}

/* Canvas */
.canvas-wrap{
  border-radius:20px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  position:relative;cursor:default;
  border:1px solid rgba(255,255,255,.1);
}
#game-canvas{display:block;width:100%;touch-action:none}
.canvas-overlay{
  display:none;position:absolute;inset:0;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(4px);
  align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:600;color:var(--text);
}
.canvas-overlay.visible{display:flex}
.spinner{
  width:32px;height:32px;border:3px solid rgba(59,130,246,.2);
  border-top-color:var(--accent-a);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Controls */
.controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:14px 18px}
.btn{
  padding:7px 18px;border-radius:10px;border:none;cursor:pointer;
  font-size:.82rem;font-weight:600;transition:all .15s;outline:none;
}
.btn-primary{background:rgba(59,130,246,.12);color:var(--accent-a);border:1px solid rgba(59,130,246,.25)}
.btn-primary:hover{background:rgba(59,130,246,.22)}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(180,205,255,.5)}
.btn-ghost:hover{background:rgba(180,205,255,.2)}
.sep{width:1px;height:24px;background:rgba(180,205,255,.5);margin:0 4px}
select{
  padding:7px 12px;border-radius:10px;border:1px solid rgba(180,205,255,.5);
  background:rgba(255,255,255,.7);color:var(--text);font-size:.82rem;
  font-weight:500;cursor:pointer;outline:none;
}
.mode-label,.speed-label,.model-label{font-size:.72rem;font-weight:600;color:var(--muted);white-space:nowrap}
.speed-wrap{display:flex;align-items:center;gap:8px}
#speed-slider{width:80px;cursor:pointer;accent-color:var(--accent-a)}
.controls-right{margin-left:auto;display:flex;align-items:center;gap:10px}

/* Log */
.log-panel{padding:12px 18px;max-height:120px;overflow-y:auto}
.log-panel p{font-size:.76rem;color:var(--muted);margin:2px 0}
.log-panel .log-goal{color:#059669;font-weight:600}

/* Hint */
.hint{
  text-align:center;font-size:.78rem;color:var(--muted);padding:8px 16px;
  background:rgba(59,130,246,.06);border-radius:10px;
}
</style>
</head>
<body>
<nav>
  <span class="nav-brand">Agent Soccer</span>
  <div class="nav-links">
    <a href="/" class="nav-link active">Play</a>
    <a href="/online" class="nav-link">Online</a>
    <a href="/playground" class="nav-link">Playground</a>
    <a href="/tournaments" class="nav-link">Tournaments</a>
    <a href="/leaderboard" class="nav-link">Leaderboard</a>
    <a href="/profile" class="nav-link">Profile</a>
  </div>
  <span class="nav-user">{{ username }}</span>
  <a href="/auth/logout" class="nav-link" style="color:#ef4444;margin-left:8px">Logout</a>
</nav>

<main>
  <!-- HUD -->
  <div class="glass hud">
    <div class="team team-a">
      <div class="team-name">You (A)</div>
      <div class="team-score" id="score-a">0</div>
    </div>
    <div class="hud-mid">
      <div class="turn-badge turn-a" id="turn-badge">Your turn</div>
      <div class="kick-counter" id="kick-counter">Kick 0 / 12</div>
      <div class="winner-banner" id="winner-banner"></div>
    </div>
    <div class="team team-b">
      <div class="team-name">AI (B)</div>
      <div class="team-score" id="score-b">0</div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <canvas id="game-canvas" width="1000" height="700"></canvas>
    <div class="canvas-overlay" id="canvas-overlay">
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
        <div class="spinner" id="overlay-spinner"></div>
        <span id="overlay-text">AI thinking…</span>
      </div>
    </div>
  </div>

  <div class="hint" id="hint-text">Drag any blue player backward (like a slingshot) then release to kick</div>

  <!-- Controls -->
  <div class="glass controls">
    <span class="mode-label">Mode</span>
    <select id="mode-select" onchange="setMode(this.value)">
      <option value="hvai">Human vs AI</option>
      <option value="hvh">Human vs Human</option>
      <option value="aivai">AI vs AI</option>
    </select>

    <div class="sep"></div>
    <span class="model-label">AI</span>
    <select id="model-select" onchange="switchModel(this.value)">
      <option value="greedy">Greedy Striker</option>
      <option value="minimax">Minimax</option>
      <option value="monte_carlo">Monte Carlo</option>
      <option value="bayesian">Bayesian</option>
      <option value="value_iteration">Value Iteration</option>
      <option value="policy_iteration">Policy Iteration</option>
      <option value="q_learning">Q-Learning</option>
    </select>

    <div class="sep"></div>
    <button class="btn btn-primary" onclick="resetGame()">New Game</button>
    <button class="btn btn-ghost" onclick="undoMove()">Undo</button>

    <div class="controls-right">
      <div class="speed-wrap">
        <span class="speed-label">Speed</span>
        <input type="range" id="speed-slider" min="0.3" max="3" step="0.1" value="1"
               oninput="setAnimSpeed(+this.value)">
      </div>
      <button class="btn btn-ghost" id="aivai-btn" style="display:none" onclick="triggerAI()">Run AI</button>
    </div>
  </div>

  <!-- Move Log -->
  <div class="glass log-panel" id="log-panel"></div>
</main>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const W = 800, H = 500;
const PLAYER_R = 20, BALL_R = 12;
const GOAL_Y1 = 185, GOAL_Y2 = 315, GOAL_DEPTH = 20;  // depth = field margin so goal mouth is at white line
const TEAM_A_COLOR = '#3b82f6';
const TEAM_B_COLOR = '#ef4444';
const BALL_COLOR   = '#facc15';
const MAX_DRAG = 110;  // px on canvas scale
const PLAYER_TRAVEL = 3.0;  // must match _PLAYER_TRAVEL in soccer_logic.py
const HOME_A = [{x:150,y:165},{x:150,y:250},{x:150,y:335}];
const HOME_B = [{x:650,y:165},{x:650,y:250},{x:650,y:335}];

// ── State ────────────────────────────────────────────────────────────────────
let gameState   = null;
let isAnimating = false;
let animSpeed   = 1.0;  // 1 = normal, higher = faster

// Drag state (human)
let dragPlayer  = null;
let dragX       = 0, dragY = 0;
let lastPullX   = 0, lastPullY = 0;

// AI drag preview state — shown while AI is "aiming"
let aiDragPreview = null;  // {team, playerIdx, hx, hy, pullX, pullY, power, kickAngle}

// Shared animated ball position — set by animateTrajectory so render() picks it up
// even when called from animatePlayerMove (running in parallel).
let animBall = null;

// Canvas
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');

// Scale from CSS pixels → canvas pixels
function cssToCv(e) {
  const r  = canvas.getBoundingClientRect();
  const sx = 1000 / r.width;
  const sy = 700 / r.height;
  const x  = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const y  = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return { x: x * sx - 100, y: y * sy - 100 };
}

// ── Drawing ──────────────────────────────────────────────────────────────────
function drawField() {
  // Grass
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0,   '#0f172a');
  grad.addColorStop(0.5, '#1e293b');
  grad.addColorStop(1,   '#0f172a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stripe pattern
  ctx.fillStyle = 'rgba(0,0,0,.04)';
  for (let x = 0; x < W; x += 80) ctx.fillRect(x, 0, 40, H);



  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,.2)';
  ctx.lineWidth   = 2;

  // Boundary
  ctx.strokeRect(20, 20, W-40, H-40);

  // Center line
  ctx.beginPath(); ctx.moveTo(W/2, 20); ctx.lineTo(W/2, H-20); ctx.stroke();

  // Center circle
  ctx.beginPath(); ctx.arc(W/2, H/2, 60, 0, Math.PI*2); ctx.stroke();

  // Center dot
  ctx.fillStyle = 'rgba(255,255,255,.65)';
  ctx.beginPath(); ctx.arc(W/2, H/2, 4, 0, Math.PI*2); ctx.fill();

  // Penalty areas
  ctx.strokeRect(20, (H-180)/2, 100, 180);
  ctx.strokeRect(W-120, (H-180)/2, 100, 180);

  // Goals
  ctx.fillStyle = 'rgba(255,255,255,.18)';
  ctx.fillRect(0, GOAL_Y1, GOAL_DEPTH, GOAL_Y2-GOAL_Y1);
  ctx.strokeRect(0, GOAL_Y1, GOAL_DEPTH, GOAL_Y2-GOAL_Y1);
  ctx.fillRect(W-GOAL_DEPTH, GOAL_Y1, GOAL_DEPTH, GOAL_Y2-GOAL_Y1);
  ctx.strokeRect(W-GOAL_DEPTH, GOAL_Y1, GOAL_DEPTH, GOAL_Y2-GOAL_Y1);

  ctx.restore();
}

function drawPlayer(x, y, team, label, highlight) {
  const col = team === 'a' ? TEAM_A_COLOR : TEAM_B_COLOR;

  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.25)';
  ctx.shadowBlur  = 8;
  ctx.shadowOffsetY = 3;

  // Outer glow if highlighted
  if (highlight) {
    ctx.beginPath();
    ctx.arc(x, y, PLAYER_R + 7, 0, Math.PI*2);
    ctx.fillStyle = col + '55';
    ctx.fill();
  }

  // Circle
  ctx.beginPath();
  ctx.arc(x, y, PLAYER_R, 0, Math.PI*2);
  const g2 = ctx.createRadialGradient(x-4, y-5, 2, x, y, PLAYER_R);
  g2.addColorStop(0, lighten(col));
  g2.addColorStop(1, col);
  ctx.fillStyle = g2;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Number
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Inter,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0;
  ctx.fillText(label, x, y);
  ctx.restore();
}

function lighten(hex) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}

function drawBall(x, y) {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.3)';
  ctx.shadowBlur  = 10;
  ctx.shadowOffsetY = 4;
  const g = ctx.createRadialGradient(x-3, y-4, 1, x, y, BALL_R);
  g.addColorStop(0, '#fff');
  g.addColorStop(0.4, BALL_COLOR);
  g.addColorStop(1, '#d97706');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x, y, BALL_R, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// Compute capped pull info from home + raw drag position
function calcPull(home) {
  const ddx = dragX - home.x, ddy = dragY - home.y;
  const dist = Math.sqrt(ddx*ddx + ddy*ddy);
  const capped = Math.min(MAX_DRAG, dist);
  const ratio  = dist > 0 ? capped / dist : 0;
  const pullX  = home.x + ddx * ratio;
  const pullY  = home.y + ddy * ratio;
  return {
    pullX, pullY,
    power:     capped / MAX_DRAG * 100,
    kickAngle: Math.atan2(home.y - pullY, home.x - pullX),  // radians
  };
}

function drawDragVisuals(hx, hy, pullX, pullY, power, kickAngle, cx, cy) {
  // kickAngle points FROM pull TOWARD home = kick direction
  ctx.save();
  ctx.lineCap = 'round';

  // Rubber band: two lines from HOME position backward to pull point
  // (player stays at home; band shows stretch going behind it)
  const perp = kickAngle + Math.PI / 2;
  const spread = 11;
  ctx.strokeStyle = 'rgba(251,146,60,.92)';
  ctx.lineWidth   = 3;
  ctx.setLineDash([]);
  for (const sign of [1, -1]) {
    const bx = hx + Math.cos(perp) * spread * sign;
    const by = hy + Math.sin(perp) * spread * sign;
    ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(pullX, pullY); ctx.stroke();
  }

  // Kick-direction arrow: from home outward in kick direction
  const arrowLen = 46 + power * 0.72;
  const ax = hx + Math.cos(kickAngle) * arrowLen;
  const ay = hy + Math.sin(kickAngle) * arrowLen;
  ctx.strokeStyle = 'rgba(255,255,255,.88)';
  ctx.lineWidth   = 2.5;
  ctx.setLineDash([10, 5]);
  ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(ax, ay); ctx.stroke();

  // Arrowhead
  ctx.setLineDash([]);
  const hl = 15, ha = 0.42;
  ctx.fillStyle = 'rgba(255,255,255,.95)';
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax - hl*Math.cos(kickAngle-ha), ay - hl*Math.sin(kickAngle-ha));
  ctx.lineTo(ax - hl*Math.cos(kickAngle+ha), ay - hl*Math.sin(kickAngle+ha));
  ctx.closePath(); ctx.fill();

  // Power bar near the pull point — drawn in absolute canvas coords
  // so it stays visible even when cursor is outside the field
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);  // reset to absolute canvas space
  const bw = 60, bh = 10;
  const barX = (cx + 100) - bw/2;  // +100 = field-to-canvas offset
  const barY = (cy + 100) - 34;
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.beginPath(); ctx.roundRect(barX, barY, bw, bh, 5); ctx.fill();
  const col = power > 70 ? '#ef4444' : power > 40 ? '#f59e0b' : '#22c55e';
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.roundRect(barX, barY, bw * power/100, bh, 5); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(barX, barY, bw, bh, 5); ctx.stroke();
  // Power percentage text
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px Inter,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(Math.round(power) + '%', barX + bw/2, barY + bh/2);
  ctx.restore();

  ctx.restore();
}

function render(ballOverride) {
  if (!gameState) return;
  ctx.clearRect(0, 0, 1000, 700);

  // Galaxy background for audience area
  ctx.save();
  const galGrad = ctx.createRadialGradient(500, 350, 100, 500, 350, 700);
  galGrad.addColorStop(0, '#0f172a');
  galGrad.addColorStop(1, '#020617');
  ctx.fillStyle = galGrad;
  ctx.fillRect(0, 0, 1000, 700);
  
  // Stars / Audience dots
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  for (let i = 0; i < 400; i++) {
    const rx = (Math.sin(i * 12.34) * 0.5 + 0.5) * 1000;
    const ry = (Math.cos(i * 43.21) * 0.5 + 0.5) * 700;
    if (rx < 90 || rx > 910 || ry < 90 || ry > 610) {
      const size = (Math.sin(i * 21.43) * 0.5 + 0.5) * 2 + 0.5;
      ctx.fillStyle = `hsla(${(i*13)%360}, 70%, 80%, ${(Math.sin(i*9.87)*0.5+0.5)*0.8 + 0.2})`;
      ctx.beginPath(); ctx.arc(rx, ry, size, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();

  ctx.save();
  ctx.translate(100, 100);

  drawField();

  const ball = ballOverride || animBall || gameState.ball;
  const isA  = gameState.is_player_a;
  const mode = gameState.game_mode;
  const over = gameState.game_over;

  // Compute pull info now (needed to know where to draw dragged player)
  let pull = null;
  if (dragPlayer !== null) {
    const home = gameState.players_a[dragPlayer];
    pull = { hx: home.x, hy: home.y, ...calcPull(home) };
  }

  // Players B — highlight the AI's chosen player during its drag preview
  const aiB = aiDragPreview && aiDragPreview.team === 'b' ? aiDragPreview.playerIdx : -1;
  gameState.players_b.forEach((p, i) => drawPlayer(p.x, p.y, 'b', i+1, i === aiB));

  // Players A — always drawn at home; dragged player highlighted; also AI-A preview
  const canSelectA = !over && !isAnimating && isA && (mode === 'hvai' || mode === 'hvh');
  const aiA = aiDragPreview && aiDragPreview.team === 'a' ? aiDragPreview.playerIdx : -1;
  gameState.players_a.forEach((p, i) => {
    const hl = (canSelectA && dragPlayer === null) || i === dragPlayer || i === aiA;
    drawPlayer(p.x, p.y, 'a', i+1, hl);
  });

  // Ball
  drawBall(ball.x, ball.y);

  // Human drag visuals (rubber band + arrow)
  if (pull !== null) {
    drawDragVisuals(pull.hx, pull.hy, pull.pullX, pull.pullY, pull.power, pull.kickAngle, dragX, dragY);
  }

  // AI drag preview — same visual style as human, so the AI "shows its aim"
  if (aiDragPreview !== null) {
    const d = aiDragPreview;
    drawDragVisuals(d.hx, d.hy, d.pullX, d.pullY, d.power, d.kickAngle, d.pullX, d.pullY);
  }

  ctx.restore();
}

// ── HUD updates ──────────────────────────────────────────────────────────────
function updateHUD(st) {
  document.getElementById('score-a').textContent = st.score_a;
  document.getElementById('score-b').textContent = st.score_b;
  document.getElementById('kick-counter').textContent = `Kick ${st.kick_count} / ${st.max_kicks}`;

  const tb   = document.getElementById('turn-badge');
  const hint = document.getElementById('hint-text');
  const wb   = document.getElementById('winner-banner');
  const over = st.game_over;

  if (over) {
    wb.style.display = 'block';
    const w = st.winner;
    wb.textContent = w === 'A' ? '🏆 You win!' : w === 'B' ? 'AI wins!' : "It's a draw!";
    wb.style.color  = w === 'A' ? '#059669' : w === 'B' ? '#ef4444' : '#6b7fa3';
    tb.style.display = 'none';
    hint.textContent = 'Game over — click New Game to play again';
  } else {
    wb.style.display = 'none';
    tb.style.display = '';
    const isA = st.is_player_a;
    const mode = st.game_mode;
    if (mode === 'hvai') {
      tb.textContent  = isA ? 'Your turn' : 'AI thinking…';
      tb.className    = 'turn-badge ' + (isA ? 'turn-a' : 'turn-b');
      hint.textContent = isA
        ? 'Drag a blue player backward then release to kick toward the right goal'
        : 'AI is calculating its shot…';
    } else if (mode === 'hvh') {
      tb.textContent  = isA ? 'Team A turn' : 'Team B turn';
      tb.className    = 'turn-badge ' + (isA ? 'turn-a' : 'turn-b');
      hint.textContent = isA
        ? 'Team A: drag a blue player to kick right'
        : 'Team B: click Run AI or wait for human to drag a red player';
    } else {
      tb.textContent  = isA ? 'Team A (AI)' : 'Team B (AI)';
      tb.className    = 'turn-badge ' + (isA ? 'turn-a' : 'turn-b');
      hint.textContent = 'AI vs AI — press Run AI to start auto-play';
    }
  }

  const aiBtn = document.getElementById('aivai-btn');
  aiBtn.style.display = (st.game_mode === 'aivai' || (st.game_mode === 'hvh' && !st.is_player_a)) ? '' : 'none';
}

function logMove(text, isGoal) {
  const panel = document.getElementById('log-panel');
  const p = document.createElement('p');
  if (isGoal) p.className = 'log-goal';
  p.textContent = text;
  panel.prepend(p);
  while (panel.children.length > 20) panel.lastChild.remove();
}

// ── Animation ────────────────────────────────────────────────────────────────
function animateTrajectory(trajectory, onDone) {
  if (!trajectory || trajectory.length === 0) { animBall = null; onDone(); return; }
  let i = 0;
  const msPerFrame = Math.max(8, 24 / animSpeed);

  function step() {
    if (i >= trajectory.length) { animBall = null; onDone(); return; }
    const pt = trajectory[i++];
    animBall = { x: pt.x, y: pt.y };
    if (pt.a && typeof gameState !== "undefined" && gameState.players_a) {
      for (let k = 0; k < 3; k++) {
        gameState.players_a[k].x = pt.a[k].x;
        gameState.players_a[k].y = pt.a[k].y;
        gameState.players_b[k].x = pt.b[k].x;
        gameState.players_b[k].y = pt.b[k].y;
      }
    }  // shared — render() picks this up from any caller
    render();
    setTimeout(step, msPerFrame);
  }
  step();
}

// Rocket player from fromPos to toPos, stays there permanently.
function animatePlayerMove(playerIdx, team, fromPos, toPos, onDone) {
  const players = team === 'a' ? gameState.players_a : gameState.players_b;
  const p = players[playerIdx];
  p.x = fromPos.x; p.y = fromPos.y;
  const STEPS = 16;
  let t = 0;

  function tick() {
    t++;
    const ease = 1 - Math.pow(1 - t / STEPS, 2);  // ease-out
    p.x = fromPos.x + (toPos.x - fromPos.x) * ease;
    p.y = fromPos.y + (toPos.y - fromPos.y) * ease;
    render();
    if (t < STEPS) setTimeout(tick, 12 / animSpeed);
    else { p.x = toPos.x; p.y = toPos.y; onDone(); }
  }
  tick();
}

// Show AI "aiming" — rubber band pulls back then releases. aiDragPreview drives render().
function showAIDragPreview(playerIdx, team, angleDeg, power, onDone) {
  const players = team === 'a' ? gameState.players_a : gameState.players_b;
  const p = players[playerIdx];
  const hx = p.x, hy = p.y;

  // Pull direction is OPPOSITE of kick (slingshot: pull back to shoot forward)
  const pullRad = (angleDeg + 180) * Math.PI / 180;
  const pullDist = (power / 100) * MAX_DRAG;
  const targetPX = hx + Math.cos(pullRad) * pullDist;
  const targetPY = hy + Math.sin(pullRad) * pullDist;
  const kickRad  = angleDeg * Math.PI / 180;

  aiDragPreview = { team, playerIdx, hx, hy, pullX: hx, pullY: hy, power: 0, kickAngle: kickRad };

  const PULL_STEPS = 22;
  let t = 0;

  function pullTick() {
    t++;
    const frac = t / PULL_STEPS;
    aiDragPreview.pullX  = hx + (targetPX - hx) * frac;
    aiDragPreview.pullY  = hy + (targetPY - hy) * frac;
    aiDragPreview.power  = power * frac;
    render();
    if (t < PULL_STEPS) setTimeout(pullTick, 18 / animSpeed);
    else setTimeout(releaseTick, 160 / animSpeed);  // brief hold at full stretch
  }

  function releaseTick() {
    aiDragPreview = null;
    render();
    onDone();
  }

  pullTick();
}

// ── Move submission ───────────────────────────────────────────────────────────

// Client-side kick endpoint (mirrors server physics) — used so we can animate
// the player flying forward even when the server has already reset them to HOME.
function kickEndpoint(from, angleDeg, power) {
  const rad = angleDeg * Math.PI / 180;
  const travel = power * PLAYER_TRAVEL;
  return {
    x: Math.max(PLAYER_R, Math.min(W - PLAYER_R, from.x + Math.cos(rad) * travel)),
    y: Math.max(PLAYER_R, Math.min(H - PLAYER_R, from.y + Math.sin(rad) * travel)),
  };
}

// After a goal: smoothly slide all 6 players back to their kickoff positions.
function animateKickoff(onDone) {
  const fromA = gameState.players_a.map(p => ({x: p.x, y: p.y}));
  const fromB = gameState.players_b.map(p => ({x: p.x, y: p.y}));
  const STEPS = 22;
  let t = 0;
  function tick() {
    t++;
    const ease = 1 - Math.pow(1 - t / STEPS, 2);
    gameState.players_a.forEach((p, i) => {
      p.x = fromA[i].x + (HOME_A[i].x - fromA[i].x) * ease;
      p.y = fromA[i].y + (HOME_A[i].y - fromA[i].y) * ease;
    });
    gameState.players_b.forEach((p, i) => {
      p.x = fromB[i].x + (HOME_B[i].x - fromB[i].x) * ease;
      p.y = fromB[i].y + (HOME_B[i].y - fromB[i].y) * ease;
    });
    render();
    if (t < STEPS) setTimeout(tick, 12 / animSpeed);
    else {
      gameState.players_a.forEach((p, i) => { p.x = HOME_A[i].x; p.y = HOME_A[i].y; });
      gameState.players_b.forEach((p, i) => { p.x = HOME_B[i].x; p.y = HOME_B[i].y; });
      onDone();
    }
  }
  tick();
}

// After a trajectory animation ends, patch gameState.ball to the last drawn point.
// Without this, the next render() would snap the ball back to its pre-kick position.
function syncBall(trajectory, scored) {
  if (!trajectory || trajectory.length === 0) return;
  const last = trajectory[trajectory.length - 1];
  // If a goal was scored the ball resets to centre; otherwise stay at final spot.
  gameState.ball = scored ? { x: 400, y: 250 } : { x: last.x, y: last.y };
}

async function submitKick(playerIdx, angleDeg, power, pullX, pullY) {
  isAnimating = true;
  setOverlay(false);

  // Capture current player position before server updates it
  const fromPosA = { x: gameState.players_a[playerIdx].x, y: gameState.players_a[playerIdx].y };

  const resp = await fetch('/move', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ player_idx: playerIdx, angle: angleDeg, power }),
  });
  const data = await resp.json();

  // Player snaps forward, then ball rolls visibly across the field
  if (data.move_result) {
    const mr = data.move_result;
    const kickEndA = mr.kick_endpoint || kickEndpoint(fromPosA, angleDeg, power);
    
    await new Promise(r => animateTrajectory(mr.trajectory, r));
    if (mr.push_result) {
      const pr = mr.push_result;
      await new Promise(r => animatePlayerMove(pr.player_idx, pr.team, pr.from, pr.to, r));
    }
    syncBall(mr.trajectory, mr.scored);
    logMove(mr.desc, !!mr.scored);
    if (mr.scored) {
      await new Promise(r => setTimeout(r, 400 / animSpeed));
      await new Promise(r => animateKickoff(r));
    }
  }

  // AI response: aim preview → player snaps → ball rolls
  if (data.ai_result) {
    const ai = data.ai_result;
    const fromPosB = { x: gameState.players_b[ai.player_idx].x, y: gameState.players_b[ai.player_idx].y };
    const kickEndB = ai.kick_endpoint || kickEndpoint(fromPosB, ai.angle, ai.power);
    await new Promise(r => setTimeout(r, 160 / animSpeed));
    await new Promise(r => showAIDragPreview(ai.player_idx, 'b', ai.angle, ai.power, r));
    
    await new Promise(r => animateTrajectory(ai.trajectory, r));
    if (ai.push_result) {
      const pr = ai.push_result;
      await new Promise(r => animatePlayerMove(pr.player_idx, pr.team, pr.from, pr.to, r));
    }
    syncBall(ai.trajectory, ai.scored);
    logMove(ai.desc, !!ai.scored);
    if (ai.scored) {
      await new Promise(r => setTimeout(r, 400 / animSpeed));
      await new Promise(r => animateKickoff(r));
    }
  }

  gameState = data;
  isAnimating = false;
  render();
  updateHUD(data);
}

async function triggerAI() {
  if (isAnimating || (gameState && gameState.game_over)) return;
  isAnimating = true;
  // No overlay — it causes a visible flash between AI turns

  const resp = await fetch('/ai_move', { method: 'POST' });
  const data = await resp.json();

  if (data.ai_result) {
    const ai   = data.ai_result;
    const team = data.is_player_a ? 'b' : 'a';
    const pool = team === 'a' ? gameState.players_a : gameState.players_b;
    const fromPos = { x: pool[ai.player_idx].x, y: pool[ai.player_idx].y };
    const kickEnd = ai.kick_endpoint || kickEndpoint(fromPos, ai.angle, ai.power);
    await new Promise(r => showAIDragPreview(ai.player_idx, team, ai.angle, ai.power, r));
    await new Promise(r => animatePlayerMove(ai.player_idx, team, fromPos, kickEnd, r));
    await new Promise(r => animateTrajectory(ai.trajectory, r));
    if (ai.push_result) {
      const pr = ai.push_result;
      await new Promise(r => animatePlayerMove(pr.player_idx, pr.team, pr.from, pr.to, r));
    }
    syncBall(ai.trajectory, ai.scored);
    logMove(ai.desc, !!ai.scored);
    if (ai.scored) {
      await new Promise(r => setTimeout(r, 400 / animSpeed));
      await new Promise(r => animateKickoff(r));
    }
  }

  gameState = data;
  isAnimating = false;
  render();
  updateHUD(data);

  // In AI vs AI mode keep running automatically until the game ends
  if (data.game_mode === 'aivai' && !data.game_over) {
    setTimeout(triggerAI, 80);
  }
}

// ── Controls ─────────────────────────────────────────────────────────────────
async function resetGame() {
  if (isAnimating) return;
  const data = await fetch('/reset', {method:'POST'}).then(r=>r.json());
  gameState = data;
  document.getElementById('log-panel').innerHTML = '';
  render();
  updateHUD(data);
}

async function undoMove() {
  if (isAnimating) return;
  const data = await fetch('/undo', {method:'POST'}).then(r=>r.json());
  gameState = data;
  render();
  updateHUD(data);
}

async function setMode(mode) {
  if (isAnimating) return;
  await fetch('/set_mode', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode})});
  const data = await fetch('/state').then(r=>r.json());
  gameState = data;
  render();
  updateHUD(data);
}

async function switchModel(name) {
  await fetch('/switch_model', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:name,target:'b'})});
}

function setAnimSpeed(v) { animSpeed = v; }

function setOverlay(show, text='AI thinking…') {
  const el = document.getElementById('canvas-overlay');
  el.classList.toggle('visible', show);
  if (show) document.getElementById('overlay-text').textContent = text;
}

// ── Drag / Slingshot input ────────────────────────────────────────────────────
function getHoveredPlayer(cx, cy) {
  if (!gameState || gameState.game_over || isAnimating) return null;
  const isA  = gameState.is_player_a;
  const mode = gameState.game_mode;
  const players = (isA || mode === 'hvh') ? gameState.players_a : null;
  if (!players) return null;
  for (let i = 0; i < players.length; i++) {
    const p = players[i];
    const d = Math.hypot(p.x - cx, p.y - cy);
    if (d < PLAYER_R + 8) return i;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const {x, y} = cssToCv(e);
  const idx = getHoveredPlayer(x, y);
  if (idx !== null) {
    dragPlayer = idx;
    dragX = x; dragY = y;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  }
});

window.addEventListener('mousemove', e => {
  if (dragPlayer !== null) {
    const {x, y} = cssToCv(e);
    dragX = x; dragY = y;
    render();
    e.preventDefault();
  } else if (e.target === canvas) {
    const {x, y} = cssToCv(e);
    const idx = getHoveredPlayer(x, y);
    canvas.style.cursor = idx !== null ? 'grab' : 'default';
  }
});

window.addEventListener('mouseup', e => {
  if (dragPlayer === null) return;
  const {x, y} = cssToCv(e);
  dragX = x; dragY = y;
  const home = gameState.players_a[dragPlayer];
  const {pullX, pullY, power, kickAngle} = calcPull(home);
  const idx = dragPlayer;
  dragPlayer = null;
  canvas.style.cursor = 'default';
  render();
  if (power > 5) {
    submitKick(idx, kickAngle * 180 / Math.PI, power, pullX, pullY);
  }
});

// Touch support
canvas.addEventListener('touchstart', e => {
  const {x, y} = cssToCv(e);
  const idx = getHoveredPlayer(x, y);
  if (idx !== null) { dragPlayer = idx; dragX = x; dragY = y; e.preventDefault(); }
}, {passive:false});

window.addEventListener('touchmove', e => {
  if (dragPlayer !== null) {
    const {x, y} = cssToCv(e);
    dragX = x; dragY = y; render();
    if(e.cancelable) e.preventDefault();
  }
}, {passive:false});

window.addEventListener('touchend', e => {
  if (dragPlayer === null) return;
  const touch = e.changedTouches[0];
  const r = canvas.getBoundingClientRect();
  dragX = (touch.clientX - r.left) * W / r.width;
  dragY = (touch.clientY - r.top)  * H / r.height;
  const home = gameState.players_a[dragPlayer];
  const {pullX, pullY, power, kickAngle} = calcPull(home);
  const idx = dragPlayer;
  dragPlayer = null; render();
  if (power > 5) submitKick(idx, kickAngle * 180 / Math.PI, power, pullX, pullY);
}, {passive:false});

// ── Init ─────────────────────────────────────────────────────────────────────
(async () => {
  const data = await fetch('/state').then(r => r.json());
  // Populate model selector
  try {
    const models = await fetch('/models').then(r => r.json());
    const sel = document.getElementById('model-select');
    sel.innerHTML = '';
    models.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.id; opt.textContent = m.name;
      if (m.id === data.ai_model) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch(e) {}

  // Set mode select
  document.getElementById('mode-select').value = data.game_mode || 'hvai';

  gameState = data;
  render();
  updateHUD(data);
})();
</script>
