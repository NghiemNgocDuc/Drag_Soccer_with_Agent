<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Agent Soccer</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#3b82f6;
  --text:#1e2d4f;
  --muted:#6b7fa3;
  --dim:#9caab8;
  --red:#ef4444;
  --glass-bg:rgba(255,255,255,.65);
  --glass-border:rgba(180,205,255,.5);
}
body{
  font-family:'Be Vietnam Pro',system-ui,sans-serif;
  font-size:14px;color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
  background:linear-gradient(145deg,#e0eaff 0%,#ede9fe 45%,#d1fae5 100%);
  overflow:hidden;
}
body::before{
  content:'';position:fixed;
  width:700px;height:700px;
  background:radial-gradient(ellipse,rgba(139,92,246,.09) 0%,transparent 65%);
  top:-180px;left:-120px;pointer-events:none;
  animation:drift 18s ease-in-out infinite alternate;
}
body::after{
  content:'';position:fixed;
  width:550px;height:500px;
  background:radial-gradient(ellipse,rgba(16,185,129,.07) 0%,transparent 65%);
  bottom:-100px;right:-60px;pointer-events:none;
  animation:drift2 22s ease-in-out infinite alternate;
}
@keyframes drift {to{transform:translate(40px,-30px)}}
@keyframes drift2{to{transform:translate(-30px,25px)}}

.card{
  position:relative;z-index:1;
  background:var(--glass-bg);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--glass-border);
  border-radius:18px;
  box-shadow:0 24px 60px rgba(80,120,200,.12),inset 0 1px 0 rgba(255,255,255,.95);
  padding:36px 32px;
  width:100%;max-width:400px;
}
.logo{text-align:center;margin-bottom:28px}
.logo h1{
  font-size:1.6rem;font-weight:700;letter-spacing:-.03em;
  background:linear-gradient(135deg,#1e2d4f 0%,#3b82f6 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo p{font-size:.75rem;color:var(--muted);margin-top:4px}
h2{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:22px}

.field{margin-bottom:15px}
label{display:block;font-size:.75rem;font-weight:500;color:var(--muted);margin-bottom:6px}
input[type="email"],input[type="password"],input[type="text"]{
  width:100%;padding:10px 13px;
  background:rgba(255,255,255,.7);
  border:1px solid var(--glass-border);
  border-radius:9px;
  font-family:inherit;font-size:.88rem;color:var(--text);
  transition:border-color .15s,background .15s;
}
input::placeholder{color:var(--dim)}
input:focus{outline:none;border-color:rgba(59,130,246,.6);background:rgba(255,255,255,.9)}

.hint{font-size:.68rem;color:var(--dim);margin-top:4px}

.btn-submit{
  width:100%;padding:11px;
  background:var(--accent);color:#fff;
  font-family:inherit;font-size:.88rem;font-weight:600;
  border:none;border-radius:9px;cursor:pointer;margin-top:8px;
  box-shadow:0 4px 16px rgba(96,165,250,.35);
  transition:opacity .15s,transform .12s;
}
.btn-submit:hover{opacity:.88;transform:translateY(-1px)}

.flash{
  background:rgba(248,113,113,.12);
  border:1px solid rgba(248,113,113,.35);
  color:var(--red);
  font-size:.78rem;padding:10px 13px;border-radius:8px;margin-bottom:16px;
}
.footer{text-align:center;margin-top:22px;font-size:.75rem;color:var(--muted)}
.footer a{color:var(--accent);text-decoration:none;font-weight:500}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Agent Soccer</h1>
    <p>Vietnamese Mancala · AI Strategy Engine</p>
  </div>

  <h2>Sign in to your account</h2>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <div class="flash">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST" action="/auth/login">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-submit">Sign In</button>
  </form>

  <div class="footer">
    Don't have an account? <a href="/register" class="nav-link">Create one</a>
  </div>
</div>
</body>
</html>
